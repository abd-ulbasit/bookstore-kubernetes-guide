# Binds the manager ServiceAccount to the manager + leader-election roles.
# Built-in objects (rbac.authorization.k8s.io/v1): dry-run/apply clean.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bookstore-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bookstore-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: bookstore-operator-controller-manager
    namespace: bookstore-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bookstore-operator-leader-election-rolebinding
  namespace: bookstore-operator-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bookstore-operator-leader-election-role
subjects:
  - kind: ServiceAccount
    name: bookstore-operator-controller-manager
    namespace: bookstore-operator-system
