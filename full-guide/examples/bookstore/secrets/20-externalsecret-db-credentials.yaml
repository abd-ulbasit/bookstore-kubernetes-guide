# Bookstore — Part 11 ch.05 "Secrets at scale": the PRODUCTION REPLACEMENT for
# the demo raw-manifests/16-db-credentials.yaml. An ESO ExternalSecret that
# pulls the DB credentials FROM Vault and SYNCS them into a Kubernetes Secret
# named EXACTLY `db-credentials` — the same name + same keys the canonical
# Bookstore already consumes — so catalog/orders (secretKeyRef) and the
# postgres StatefulSet (envFrom) work UNCHANGED.
#
# ── ADDITIVE / CANONICAL-UNTOUCHED (the honesty contract) ──────────────────
#   raw-manifests/16-db-credentials.yaml is the DEMO Secret: a literal
#   `devpassword` committed to Git ONLY because this is a throwaway lab. It is
#   the documented anti-pattern. This file is the REAL way: the secret value
#   lives in Vault (rotated, audited, never in Git); ESO materialises a
#   Kubernetes Secret from it. 16- is NOT modified, NOT deleted from the repo
#   — it remains the teaching baseline. THE SWAP is operational, shown in the
#   chapter and reversible:
#     SWAP IN  (Vault/ESO is the source of truth):
#       kubectl delete secret db-credentials -n bookstore --ignore-not-found
#       kubectl apply -f examples/bookstore/secrets/20-externalsecret-db-credentials.yaml
#       # ESO (re)creates `db-credentials` from Vault, then keeps it in sync.
#     REVERT  (back to the demo baseline):
#       kubectl delete -f examples/bookstore/secrets/20-externalsecret-db-credentials.yaml
#       kubectl apply  -f examples/bookstore/raw-manifests/16-db-credentials.yaml
#   The DB_DSN the apps build is byte-identical either way (same keys:
#   POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB) — that is the design
#   guarantee that makes the swap transparent to the workloads.
#
# ── REFRESH / ROTATION ─────────────────────────────────────────────────────
#   refreshInterval: ESO re-reads Vault on this cadence and updates the
#   Secret. Rotate the value in Vault (`vault kv put secret/bookstore/db
#   POSTGRES_PASSWORD=...`) and within one interval the Kubernetes Secret
#   changes. File-mounted consumers pick it up on the volume re-sync; env-var
#   consumers (the Bookstore's DB_DSN is env, Part 03 ch.02) still need a
#   rollout — same rotation caveat as Part 03 ch.02 / Part 05 ch.04, now
#   centrally driven from Vault instead of a hand-edited Secret.
#
# !!! CRD-INTRINSIC DRY-RUN (identical precedent to 18-/51-/70-/83-/argocd) !!!
#   `ExternalSecret` is an ESO CRD (external-secrets.io/v1). WITHOUT ESO
#   installed a client dry-run prints:
#     no matches for kind "ExternalSecret" in version "external-secrets.io/v1"
#   EXPECTED, schema-correct — ESO CRDs/controller must be installed first.
#   Whole-dir dry-run prints this for CRD-backed files only and continues.
#   Schema verified against External Secrets Operator external-secrets.io/v1
#   ExternalSecret.
#
# THE SYNCED SECRET STAYS RESTRICTED-COMPLIANT FOR CONSUMERS: ESO produces an
# ordinary Opaque Secret; nothing about it changes the catalog/orders/postgres
# Pods, which remain exactly as PSA-`restricted`-compliant as they already are
# (Part 05 ch.02). ESO injects NOTHING into the app Pods (contrast the Vault
# Agent sidecar — chapter "How it works"); the consumer pods are untouched.
#
# Requires: ESO installed; Vault seeded + k8s auth (00-); 05- + 10- applied.
# Apply (the swap-in above):
#   kubectl apply -f examples/bookstore/secrets/20-externalsecret-db-credentials.yaml
#   kubectl get externalsecret -n bookstore
#   kubectl get secret db-credentials -n bookstore -o jsonpath='{.data.POSTGRES_USER}' | base64 -d
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: bookstore
  labels:
    app: postgres
    app.kubernetes.io/part-of: bookstore
spec:
  refreshInterval: "1h"            # ESO re-reads Vault hourly (rotation cadence)
  secretStoreRef:
    name: vault-backend            # 10-secretstore-vault.yaml
    kind: SecretStore
  target:
    name: db-credentials           # EXACT name the canonical Bookstore consumes
    creationPolicy: Owner          # ESO creates+owns this Secret (deletes with ES)
    template:
      type: Opaque                 # same type as the demo 16- Secret
  data:
    # Each Kubernetes Secret key ← a Vault KV v2 key at secret/bookstore/db.
    # The KEYS are byte-identical to 16-db-credentials.yaml so DB_DSN is
    # unchanged (catalog/orders secretKeyRef + postgres envFrom just work).
    - secretKey: POSTGRES_USER
      remoteRef:
        key: bookstore/db
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: bookstore/db
        property: POSTGRES_PASSWORD
    - secretKey: POSTGRES_DB
      remoteRef:
        key: bookstore/db
        property: POSTGRES_DB
