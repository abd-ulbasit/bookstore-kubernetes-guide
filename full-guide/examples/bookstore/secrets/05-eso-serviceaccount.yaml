# Bookstore — Part 11 ch.05 "Secrets at scale": the dedicated ServiceAccount
# External Secrets Operator uses to authenticate to Vault's Kubernetes auth
# method (its projected token is what `vault write auth/kubernetes/role/...`
# binds — see 00-vault-policy-and-role.yaml).
#
# WHY A DEDICATED SA (least privilege, Part 05 ch.01): Vault's k8s auth
# verifies the *presented* SA token and maps `bookstore:bookstore-eso` to the
# `bookstore-ro` policy (read ONLY secret/data/bookstore/db). The Bookstore
# app ServiceAccounts (05-serviceaccounts-rbac.yaml, UNTOUCHED) get NO Vault
# access — only this ESO identity does, and only read-only on one path. The
# apps never see Vault; they consume the plain Kubernetes Secret ESO syncs.
#
# WHAT WRITES THE SYNCED SECRET (read this — do NOT build RBAC off the wrong
# mental model): the `db-credentials` Secret is created/updated by **ESO's
# OWN controller ServiceAccount**, which the External Secrets Operator Helm
# chart installs (cluster-scoped, in the `external-secrets` namespace) with
# the permissions it needs. The `bookstore-eso` SA here is NOT that — it is
# ONLY the **Vault auth identity** (its projected token is presented to Vault;
# Vault's k8s auth maps it to the `bookstore-ro` policy — see
# 10-secretstore-vault.yaml / 00-vault-policy-and-role.yaml). The Role/
# RoleBinding below are therefore OPTIONAL, in-namespace defense-in-depth
# (they do not grant the ESO controller anything it lacks; they make the
# in-namespace Secret-writer permission explicit/auditable). Removing them
# does NOT break the sync; the ESO controller SA already suffices.
#
# Built-in kinds (ServiceAccount + the optional Role/RoleBinding): a client
# dry-run is CLEAN with no CRDs/operator installed — no CRD-intrinsic note
# needed here (these are core/v1 + rbac.authorization.k8s.io/v1, valid on any
# v1.30+ cluster).
#
# Requires: kubectl apply -f examples/bookstore/raw-manifests/00-namespace.yaml
# Apply (BEFORE the SecretStore/ExternalSecret):
#   kubectl apply -f examples/bookstore/secrets/05-eso-serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookstore-eso
  namespace: bookstore
  labels:
    app.kubernetes.io/part-of: bookstore
---
# OPTIONAL in-namespace defense-in-depth (see the header). The actual writer
# of `db-credentials` is ESO's OWN controller SA (Helm-installed, cluster-
# scoped, external-secrets ns) — NOT `bookstore-eso`. This Role/RoleBinding
# only makes an explicit, auditable in-namespace Secret-writer grant; it is
# NOT required for the sync to work and may be removed (or its subject
# repointed at the real ESO controller SA if you scope ESO per-namespace).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bookstore-eso-secret-writer
  namespace: bookstore
  labels:
    app.kubernetes.io/part-of: bookstore
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bookstore-eso-secret-writer
  namespace: bookstore
  labels:
    app.kubernetes.io/part-of: bookstore
subjects:
  - kind: ServiceAccount
    name: bookstore-eso
    namespace: bookstore
roleRef:
  kind: Role
  name: bookstore-eso-secret-writer
  apiGroup: rbac.authorization.k8s.io
