# Bookstore — Part 11 ch.05 "Secrets at scale": the External Secrets Operator
# SecretStore that points at the (dev-mode) HashiCorp Vault, authenticating
# via Vault's KUBERNETES auth method using the bookstore-eso SA token.
#
# WHAT A SecretStore IS
#   A SecretStore (namespaced) / ClusterSecretStore (cluster-scoped) is the
#   ESO object that says "here is an external secret backend and how to
#   authenticate to it". ExternalSecrets (20-) then reference it to pull
#   specific keys. This one: backend = Vault KV v2 at mount `secret`, auth =
#   Kubernetes auth method, role `bookstore-eso`, SA `bookstore-eso`.
#
# AUTH FLOW (no static credential anywhere — the whole point):
#   ESO presents the bookstore-eso SA's PROJECTED token to Vault →
#   Vault's k8s auth verifies it with the cluster API and maps it to the
#   `bookstore-ro` policy (00-vault-policy-and-role.yaml) → Vault returns a
#   SHORT-LIVED Vault token → ESO reads secret/data/bookstore/db → writes a
#   plain Kubernetes Secret (20-). No long-lived Vault token is stored; the
#   trust anchor is the SA token + Vault policy, rotated automatically.
#
# !!! CRD-INTRINSIC DRY-RUN (identical precedent to 18-/51-/70-/83-/argocd) !!!
#   `SecretStore` is an External Secrets Operator CRD
#   (external-secrets.io/v1). WITHOUT ESO installed a client dry-run prints:
#     no matches for kind "SecretStore" in version "external-secrets.io/v1"
#   EXPECTED and schema-correct — the ESO CRDs/controller must be installed
#   first (chapter Hands-on, pinned Helm `external-secrets`). A whole-dir
#   dry-run prints this for the CRD-backed files only and continues; built-in
#   objects (05-) still validate. Schema verified against the External Secrets
#   Operator external-secrets.io/v1 SecretStore + the Vault provider spec.
#
# Requires: ESO installed (own ns); Vault reachable + k8s auth configured
#   (00-); 05-eso-serviceaccount.yaml applied.
# Apply:
#   kubectl apply -f examples/bookstore/secrets/10-secretstore-vault.yaml
#   kubectl get secretstore -n bookstore
#   kubectl get secretstore vault-backend -n bookstore \
#     -o jsonpath='{.status.conditions[*].type}={.status.conditions[*].status}{"\n"}'
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: bookstore
  labels:
    app.kubernetes.io/part-of: bookstore
spec:
  provider:
    vault:
      # Dev-mode Vault Service installed by the Vault Helm chart in its OWN
      # namespace (`vault`), reached cross-namespace by DNS. NOT bookstore.
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"            # KV v2 mount
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"          # the enabled k8s auth method
          role: "bookstore-eso"            # 00-: bound to policy bookstore-ro
          serviceAccountRef:
            name: "bookstore-eso"          # 05-: its projected token is sent
