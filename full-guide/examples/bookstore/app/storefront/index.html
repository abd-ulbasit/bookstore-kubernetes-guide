<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bookstore</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.25rem; }
    .muted { color: #666; font-size: 0.9rem; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f5f5f5; }
    form { display: flex; gap: 0.5rem; align-items: end; flex-wrap: wrap; margin-top: 1rem; }
    label { display: flex; flex-direction: column; font-size: 0.85rem; }
    input { padding: 0.4rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    #status { margin-top: 0.75rem; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Bookstore</h1>
  <p class="muted">Static storefront. Calls <code>/api/books</code> (catalog) and posts to <code>/api/orders</code> (orders).</p>

  <h2>Catalog</h2>
  <table id="books">
    <thead><tr><th>ID</th><th>Title</th><th>Author</th><th>Price</th></tr></thead>
    <tbody><tr><td colspan="4">Loading…</td></tr></tbody>
  </table>

  <h2>Place an order</h2>
  <form id="order-form">
    <label>Book ID
      <input type="number" id="book_id" name="book_id" min="1" value="1" required />
    </label>
    <label>Quantity
      <input type="number" id="qty" name="qty" min="1" value="1" required />
    </label>
    <button type="submit">Order</button>
  </form>
  <div id="status"></div>

  <script>
    // esc HTML-escapes a value before it is interpolated into innerHTML.
    // Always escape server/user-controlled data to prevent XSS.
    function esc(v) {
      return String(v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function loadBooks() {
      const tbody = document.querySelector('#books tbody');
      try {
        const res = await fetch('/api/books');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const books = await res.json();
        tbody.innerHTML = books.map(b =>
          `<tr><td>${esc(b.id)}</td><td>${esc(b.title)}</td><td>${esc(b.author)}</td><td>$${esc(b.price)}</td></tr>`
        ).join('') || '<tr><td colspan="4">No books</td></tr>';
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="4">Catalog unavailable: ${esc(e.message)}</td></tr>`;
      }
    }

    document.getElementById('order-form').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const status = document.getElementById('status');
      const body = {
        book_id: Number(document.getElementById('book_id').value),
        qty: Number(document.getElementById('qty').value),
      };
      status.textContent = 'Placing order…';
      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        status.textContent = res.ok
          ? `Order accepted (id ${data.order_id ?? '?'})`
          : `Order failed: ${data.error ?? res.status}`;
      } catch (e) {
        status.textContent = 'Order failed: ' + e.message;
      }
    });

    loadBooks();
  </script>
</body>
</html>
