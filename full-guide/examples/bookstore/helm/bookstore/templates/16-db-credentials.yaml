{{/*
  Postgres credentials Secret (raw-manifests 16-db-credentials.yaml).

  !!! DEMO-ONLY VALUE !!!  A Secret is base64-encoded, NOT encrypted. base64 is
  trivially reversible. Anyone who can `get secret` in this namespace, or read
  etcd, sees the password in clear. Shipping a literal password in values.yaml
  is acceptable ONLY because this is a throwaway local guide. In a real chart
  you set dbCredentials.create=false and have External Secrets Operator /
  Sealed Secrets / Vault provide a Secret of the SAME NAME
  ({{ .Values.dbCredentials.secretName }}), and enable encryption-at-rest on
  the apiserver. See Part 07 ch.01 Production notes ("don't put secrets in
  values.yaml") and Part 05 ch.02/ch.04.

  stringData: the apiserver base64-encodes it into .data on write.
*/}}
{{- if .Values.dbCredentials.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.dbCredentials.secretName }}
  namespace: {{ include "bookstore.namespace" . }}
  labels:
    {{- include "bookstore.labels" (dict "ctx" . "app" "postgres") | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.dbCredentials.POSTGRES_USER | quote }}
  POSTGRES_PASSWORD: {{ .Values.dbCredentials.POSTGRES_PASSWORD | quote }}
  POSTGRES_DB: {{ .Values.dbCredentials.POSTGRES_DB | quote }}
{{- end }}
