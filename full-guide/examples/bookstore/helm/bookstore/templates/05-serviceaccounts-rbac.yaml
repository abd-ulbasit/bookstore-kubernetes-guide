{{/*
  One dedicated ServiceAccount per workload + catalog's least-privilege Role
  (raw-manifests 05-serviceaccounts-rbac.yaml). All SAs set
  automountServiceAccountToken:false (no Bookstore Pod uses the `default` SA;
  none calls kube-apiserver). Only catalog-sa is bound to the tiny
  resource-name-scoped Role (get the catalog-config ConfigMap by name) — a
  pure teaching example of "deny-by-default, allow one verb on one object".
*/}}
{{- if .Values.serviceAccounts.create }}
{{- $ctx := . }}
{{- $automount := .Values.serviceAccounts.automountServiceAccountToken }}
{{- range $sa := list
    (dict "name" "catalog-sa"          "app" "catalog")
    (dict "name" "storefront-sa"       "app" "storefront")
    (dict "name" "orders-sa"           "app" "orders")
    (dict "name" "payments-worker-sa"  "app" "payments-worker")
    (dict "name" "postgres-sa"         "app" "postgres")
    (dict "name" "redis-sa"            "app" "redis")
    (dict "name" "rabbitmq-sa"         "app" "rabbitmq")
    (dict "name" "migrate-sa"          "app" "db-migrate") }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa.name }}
  namespace: {{ include "bookstore.namespace" $ctx }}
  labels:
    {{- include "bookstore.labels" (dict "ctx" $ctx "app" $sa.app) | nindent 4 }}
automountServiceAccountToken: {{ $automount }}
{{- end }}
{{- end }}
{{- if .Values.rbac.create }}
---
# catalog's least-privilege Role: GET (only) the single ConfigMap it owns, BY
# NAME. No list/watch (those bypass resourceNames), no secrets, nothing else.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: catalog-config-reader
  namespace: {{ include "bookstore.namespace" . }}
  labels:
    {{- include "bookstore.labels" (dict "ctx" . "app" "catalog") | nindent 4 }}
rules:
  - apiGroups: [""]                 # "" = core group (configmaps live here)
    resources: ["configmaps"]
    resourceNames: ["catalog-config"]
    verbs: ["get"]
---
# Bind that Role to catalog-sa ONLY. Every other SA has NO binding ⇒
# deny-by-default (and no token mounted anyway).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: catalog-config-reader-binding
  namespace: {{ include "bookstore.namespace" . }}
  labels:
    {{- include "bookstore.labels" (dict "ctx" . "app" "catalog") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: catalog-sa
    namespace: {{ include "bookstore.namespace" . }}
roleRef:
  kind: Role
  name: catalog-config-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
