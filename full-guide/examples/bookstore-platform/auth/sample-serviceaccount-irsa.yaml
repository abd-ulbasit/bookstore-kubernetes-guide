# Bookstore Platform v2 — Part 13 ch.04: a sample ServiceAccount carrying
# the EKS-IRSA annotation pattern. THIS IS THE REAL ANNOTATION USED IN
# PRODUCTION; on kind it is inert (no AWS STS endpoint, no Pod Identity
# webhook) so the SA behaves as a plain SA there — that gap is documented
# in 13.04 and cross-refs Part 10 ch.03 for the actual wiring.
#
# The catalog Pod in this tenant's namespace runs as `catalog-irsa-sa`. On
# EKS with the IRSA mutating webhook installed:
#   - the webhook injects a projected ServiceAccount token whose audience is
#     `sts.amazonaws.com` + the cluster's OIDC provider URL,
#   - the AWS SDK in the container calls STS AssumeRoleWithWebIdentity using
#     that token,
#   - STS returns scoped temporary credentials for the IAM role named in the
#     annotation,
#   - the SDK refreshes them automatically.
# No static key in the Pod. No long-lived AWS credential anywhere.
#
# automountServiceAccountToken: true here because the workload DOES need a
# token (the IRSA flow uses the projected SA token as the federated identity
# proof). This is the EXCEPTION to the v1 Bookstore's
# automount=false-everywhere rule — IRSA workloads need their token.
#
# Apply (no-op on kind beyond creating the SA; the IRSA wiring is cloud-side):
#   kubectl apply -f examples/bookstore-platform/auth/sample-serviceaccount-irsa.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: catalog-irsa-sa
  namespace: bookstore-platform-acme-books
  labels:
    app: catalog
    app.kubernetes.io/part-of: bookstore-platform
    bookstore-platform.example.com/tenant: acme-books
  annotations:
    # EKS IRSA: the IAM role this SA's projected token will assume. The role
    # ARN is environment-specific — production overrides this via Kustomize
    # patch per cluster + region. The `<ACCOUNT-ID>` and `<REGION>` and
    # `<CLUSTER>` placeholders are UPPERCASE so they render correctly across
    # Markdown viewers (and so a grep catches them before apply).
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT-ID>:role/bookstore-platform-catalog-acme-books"
    # Optional: the audience the projected token is bound to. Default is
    # `sts.amazonaws.com` if omitted. Explicit is clearer.
    eks.amazonaws.com/audience: "sts.amazonaws.com"
    # GKE Workload Identity equivalent (commented; uncomment + remove the EKS
    # annotation above on GKE — Part 10 ch.03):
    # iam.gke.io/gcp-service-account: "catalog-acme-books@<PROJECT>.iam.gserviceaccount.com"
    # AKS Workload Identity equivalent (commented; uncomment on AKS):
    # azure.workload.identity/client-id: "<APP-CLIENT-ID>"
    # azure.workload.identity/tenant-id: "<TENANT-ID>"
automountServiceAccountToken: true
