# Bookstore Platform v2 — Part 13 ch.05: Meilisearch as the v2 search engine.
# One StatefulSet per region (search is regional; indexes do NOT replicate
# cross-region — each region's Debezium connector feeds its local
# Meilisearch from the local Postgres replica).
#
# Why Meilisearch (vs OpenSearch / Typesense / Algolia)
#   - Meilisearch is the lightest of the four (single Go binary, single
#     process, no JVM) — easiest operational story on Kubernetes.
#   - Typo tolerance + relevance ranking + faceting + filtering are all
#     built in — no plug-in / query DSL the way OpenSearch needs.
#   - StatefulSet + a single PVC is the production pattern. Sharding
#     (Meilisearch's "instance pool" model) is reserved for >10M documents.
# Algolia is the SaaS alternative; teams that prefer "managed search and
# never run a search engine" should pick it. The chapter walks both.
#
# StatefulSet (not Deployment) because the engine writes to a persistent
# volume and Pod identity matters for stable storage. `serviceName` ties to
# the headless Service below; one replica is fine for the chapter, two+ for
# HA (Meilisearch v1.7+ supports a built-in cluster mode via the experimental
# `--cluster` flag — production-shape after ch.13.05 graduates to the day-2
# tier in ch.13.12).
#
# PSA: bookstore-platform-system is `enforce: restricted`. The PodSpec uses
# the non-root official image (1.7-alpine) + the standard restricted set of
# securityContext fields.
#
# Apply:
#   kubectl apply -f examples/bookstore-platform/search/meilisearch.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: bookstore-platform-search
  labels:
    app.kubernetes.io/part-of: bookstore-platform
    bookstore-platform.example.com/scope: search
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: meilisearch
  namespace: bookstore-platform-search
  labels:
    app.kubernetes.io/part-of: bookstore-platform
    app.kubernetes.io/component: search-engine
automountServiceAccountToken: false
---
# Headless Service — gives each StatefulSet Pod stable DNS (e.g.
# meilisearch-0.meilisearch-headless.bookstore-platform-search.svc.cluster.local).
# Used by the StatefulSet's serviceName for governing identity; not by
# application clients.
apiVersion: v1
kind: Service
metadata:
  name: meilisearch-headless
  namespace: bookstore-platform-search
  labels:
    app.kubernetes.io/part-of: bookstore-platform
    app.kubernetes.io/component: search-engine
spec:
  clusterIP: None
  selector:
    app: meilisearch
  ports:
    - name: http
      port: 7700
      targetPort: 7700
---
# Regular client Service — the address the search app talks to
# (`meilisearch.bookstore-platform-search.svc.cluster.local:7700`).
# clusterIP auto-assigned; load-balances across the StatefulSet's
# replicas.
apiVersion: v1
kind: Service
metadata:
  name: meilisearch
  namespace: bookstore-platform-search
  labels:
    app.kubernetes.io/part-of: bookstore-platform
    app.kubernetes.io/component: search-engine
spec:
  selector:
    app: meilisearch
  ports:
    - name: http
      port: 7700
      targetPort: 7700
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  namespace: bookstore-platform-search
  labels:
    app: meilisearch
    app.kubernetes.io/part-of: bookstore-platform
    app.kubernetes.io/component: search-engine
spec:
  serviceName: meilisearch-headless
  replicas: 1
  selector:
    matchLabels:
      app: meilisearch
  template:
    metadata:
      labels:
        app: meilisearch
        app.kubernetes.io/part-of: bookstore-platform
    spec:
      serviceAccountName: meilisearch
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.7-alpine
          imagePullPolicy: IfNotPresent
          args:
            - "--master-key"
            - "$(MEILI_MASTER_KEY)"
            - "--http-addr"
            - "0.0.0.0:7700"
            - "--db-path"
            - "/data/meilisearch"
            - "--env"
            - "production"
          env:
            # In production the master key is pulled from ESO + Vault.
            # The placeholder is UPPERCASE so a grep catches an
            # un-replaced value before apply.
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: meilisearch-master-key
                  key: master-key
          ports:
            - name: http
              containerPort: 7700
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# Placeholder Secret — REPLACE via ESO + Vault in production
# (Part 11 ch.05 — ESO + Vault wiring). The chapter calls this out
# explicitly and the value here is a labelled placeholder, NOT a real key.
apiVersion: v1
kind: Secret
metadata:
  name: meilisearch-master-key
  namespace: bookstore-platform-search
  labels:
    app.kubernetes.io/part-of: bookstore-platform
    bookstore-platform.example.com/placeholder: "true"
type: Opaque
stringData:
  master-key: "REPLACE-ME-VIA-ESO-NOT-IN-SOURCE"
