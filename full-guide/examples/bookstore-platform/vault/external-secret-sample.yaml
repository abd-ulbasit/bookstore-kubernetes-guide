# Bookstore Platform v2 — Part 15 ch.05: sample ExternalSecret CR.
#
# This is the production pattern for syncing a tenant's catalog DB
# password from Vault into a Kubernetes Secret. The Secret it creates
# (named `catalog-db-credentials`) has the SAME keys the catalog
# Deployment's `envFrom` consumes — so the swap from a static (demo)
# Secret to a Vault-synced one is byte-identical to the workload (the
# same discipline as Part 11 ch.05's `20-externalsecret-db-credentials`).
#
# This example targets the `bookstore-platform-acme-books` tenant
# namespace. The Crossplane Composition (Part 13 ch.02) stamps an
# ExternalSecret of this shape for every onboarded tenant.
#
# !!! CRD-INTRINSIC DRY-RUN
#   `ExternalSecret` is `external-secrets.io/v1` — an ESO CRD. WITHOUT
#   ESO installed (Part 11 ch.05 install path), a client dry-run prints:
#     no matches for kind "ExternalSecret" in version "external-secrets.io/v1"
#   EXPECTED. After ESO is installed, this applies; ESO creates the
#   `catalog-db-credentials` Secret within the refreshInterval cadence.
#
# Apply:
#   kubectl apply -f examples/bookstore-platform/vault/external-secret-sample.yaml
#   kubectl get externalsecret catalog-db-credentials \
#     -n bookstore-platform-acme-books \
#     -o jsonpath='{.status.conditions[*].type}={.status.conditions[*].status}{"\n"}'
#   # expect SecretSynced=True
#   kubectl get secret catalog-db-credentials \
#     -n bookstore-platform-acme-books \
#     -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d; echo

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: catalog-db-credentials
  namespace: bookstore-platform-acme-books
  labels:
    app.kubernetes.io/part-of: bookstore-platform
    app.kubernetes.io/component: catalog
    bookstore-platform.example.com/tenant: acme-books
spec:
  # ── Refresh cadence ────────────────────────────────────────────────────
  # Every 1h ESO re-reads Vault and updates the Secret if the value
  # changed. The cadence MUST be shorter than the Vault dynamic-secret
  # lease (1h here matches the database engine's default_ttl in
  # `rotation/postgres-rotate.sh`). For static KV reads, 1h is the
  # platform's standard rotation-cadence.
  refreshInterval: "1h"

  # ── Backend store ──────────────────────────────────────────────────────
  # Refers to the ClusterSecretStore in `cluster-secret-store.yaml`. The
  # store carries the Vault address + auth method + role; this
  # ExternalSecret only says WHAT to pull, not WHERE FROM.
  secretStoreRef:
    name: vault-bookstore-platform
    kind: ClusterSecretStore

  # ── Target Secret in the namespace ─────────────────────────────────────
  # ESO creates and reconciles this Secret. `creationPolicy: Owner` means
  # ESO owns the Secret's lifecycle (delete the ExternalSecret → ESO
  # deletes the Secret). The Secret's keys are EXACTLY what the catalog
  # Deployment's `envFrom: secretRef` expects, so the swap is transparent.
  target:
    name: catalog-db-credentials
    creationPolicy: Owner
    # Templating: shape Vault's raw KV values into the keys the workload
    # consumes. The template MUST yield byte-identical keys to the demo
    # Secret it replaces — that is what makes the swap zero-app-change.
    template:
      type: Opaque
      data:
        POSTGRES_USER:     "{{ .username }}"
        POSTGRES_PASSWORD: "{{ .password }}"
        POSTGRES_DB:       "{{ .dbname }}"
        # DB_DSN convenience for apps that read one env var; the same
        # shape Part 11 ch.05's catalog consumes.
        DB_DSN: "postgresql://{{ .username }}:{{ .password }}@postgres.bookstore-platform-acme-books.svc.cluster.local:5432/{{ .dbname }}?sslmode=require"

  # ── Pull from Vault ────────────────────────────────────────────────────
  # The remoteRef.key is the Vault path WITHOUT the `secret/data/` prefix
  # (ESO infers KV v2 from the store's `version: v2`). The Vault path
  # for this tenant is `secret/data/bookstore-platform/acme-books/catalog/db-password`.
  data:
    - secretKey: username
      remoteRef:
        key: bookstore-platform/acme-books/catalog/db-password
        property: username
    - secretKey: password
      remoteRef:
        key: bookstore-platform/acme-books/catalog/db-password
        property: password
    - secretKey: dbname
      remoteRef:
        key: bookstore-platform/acme-books/catalog/db-password
        property: dbname

  # ── Conflict policy ────────────────────────────────────────────────────
  # If a human creates a Secret with the same name out-of-band, ESO will
  # refuse to overwrite it (Merge would clobber; Replace would error if
  # the existing Secret had `Owner` already; the default `Owner` policy
  # is the safest — ESO will only manage Secrets it created).
