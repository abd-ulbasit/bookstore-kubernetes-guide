# Bookstore Platform v2 — Part 15 ch.05: ClusterSecretStore — the
# cluster-wide ESO binding to the Phase-15-R-installed Vault.
#
# ClusterSecretStore (vs SecretStore) is cluster-scoped: one definition,
# every tenant ns references it. This is the multi-tenant pattern; per-
# tenant isolation lives in the Vault POLICY (not in the ESO store). The
# `serviceAccountRef` in each tenant's ExternalSecret picks the
# tenant-scoped SA, which authenticates against the tenant-scoped Vault
# role from `auth-k8s/role-bookstore-platform.yaml`. One store, N tenants,
# zero cross-tenant secret leakage by Vault-policy construction.
#
# Phase 15-R provisions the production Vault via Terraform (Helm in HA
# mode, KMS auto-unseal, audit device). This file consumes that Vault.
# The dev-mode Vault from Part 11 ch.05 also works for local validation;
# only `server` changes between dev and prod.
#
# !!! CRD-INTRINSIC DRY-RUN
#   `ClusterSecretStore` is `external-secrets.io/v1` — an ESO CRD. WITHOUT
#   ESO installed (Part 11 ch.05 install path), a client dry-run prints:
#     no matches for kind "ClusterSecretStore" in version "external-secrets.io/v1"
#   EXPECTED. After ESO is installed, this applies cluster-wide.
#
# Apply:
#   kubectl apply -f examples/bookstore-platform/vault/cluster-secret-store.yaml
#   kubectl get clustersecretstore vault-bookstore-platform \
#     -o jsonpath='{.status.conditions[*].type}={.status.conditions[*].status}{"\n"}'
#   # expect Ready=True (ESO authenticated to Vault via k8s auth)

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-bookstore-platform
  labels:
    app.kubernetes.io/part-of: bookstore-platform
    app.kubernetes.io/managed-by: gitops
spec:
  provider:
    vault:
      # The Vault server address. Phase 15-R Terraform exposes Vault via
      # an internal-only Service (no public Ingress); the address resolves
      # to `vault-active` Service in the `vault` ns (HA mode names the
      # active node service `vault-active`).
      server: "https://vault-active.vault.svc.cluster.local:8200"
      # KV v2 mount path (default for KV v2 in Vault — `secret` mount,
      # `v2` engine; `path` does NOT include the `/data/` subpath that
      # Vault inserts under the hood for KV v2).
      path: "secret"
      version: "v2"
      # Vault server TLS — Phase 15-R issues an internal cert via cert-
      # manager from the platform's CA. The caProvider points at the CA
      # ConfigMap so ESO validates the server cert (NEVER skipTLSVerify
      # in production).
      caProvider:
        type: ConfigMap
        name: vault-server-ca
        namespace: vault
        key: ca.crt
      auth:
        kubernetes:
          # The Vault auth method's mount path (default `kubernetes`).
          mountPath: kubernetes
          # The role bound to the tenant's SA. ESO uses TEMPLATING here:
          # the tenant-scoped role name is built from the tenant ns via
          # the ExternalSecret's `data.sourceRef` overrides, OR per-tenant
          # ExternalSecrets reference per-tenant ClusterSecretStores
          # (heavier but stricter — see Production notes in Part 15 ch.05).
          # The PLACEHOLDER role here represents the catalog example; in
          # production the Crossplane Composition stamps one
          # ClusterSecretStore per tenant OR the ExternalSecret overrides
          # the role per-namespace.
          role: bookstore-platform-acme-books
          serviceAccountRef:
            name: bookstore-platform-eso
            # Cluster-scoped store needs an explicit namespace for the SA;
            # the SA itself is created by the Composition in each tenant
            # namespace.
            namespace: bookstore-platform-acme-books
