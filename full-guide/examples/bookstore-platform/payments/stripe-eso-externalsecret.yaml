# Bookstore Platform v2 — Part 13 ch.06: the ExternalSecret that pulls the
# Stripe API key + webhook secret from Vault into a Kubernetes Secret. This
# is the same pattern Part 11 ch.05 (ESO + Vault wiring) teaches; the file
# stands as the documented production-shape for every Stripe-key reference
# in payments/.
#
# !!! CRD-INTRINSIC DRY-RUN
#   `ExternalSecret` is `external-secrets.io/v1beta1` — an ESO CRD.
#   WITHOUT ESO installed:
#     no matches for kind "ExternalSecret" in version "external-secrets.io/v1beta1"
#   EXPECTED. After `helm install external-secrets/external-secrets` (pinned)
#   this applies cleanly; the operator creates the target Secret on first
#   reconcile.
#
# The chapter walks the install in §Hands-on; the placeholder Secrets in
# payments-worker.yaml / payments-webhook-receiver.yaml are the kind-runnable
# fallback. In production this ExternalSecret REPLACES those placeholders by
# stamping the SAME-NAMED Secret with the real values fetched from Vault.
#
# Apply (after ESO + a ClusterSecretStore wired to your Vault):
#   kubectl apply -f examples/bookstore-platform/payments/stripe-eso-externalsecret.yaml
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stripe-api-key
  namespace: bookstore-platform-payments
  labels:
    app.kubernetes.io/part-of: bookstore-platform
    app.kubernetes.io/component: payments-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    # Cluster-scoped store wired to Vault in `bookstore-platform-system`.
    # The chapter cross-refs Part 11 ch.05 for the ClusterSecretStore + Vault
    # auth (Kubernetes auth method, role per-tenant).
    name: bookstore-platform-vault
    kind: ClusterSecretStore
  target:
    # Materialises as the Secret payments-gateway / payments-worker mount.
    name: stripe-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: kv/bookstore-platform/stripe
        property: api_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stripe-webhook-secret
  namespace: bookstore-platform-payments
  labels:
    app.kubernetes.io/part-of: bookstore-platform
    app.kubernetes.io/component: payments-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bookstore-platform-vault
    kind: ClusterSecretStore
  target:
    name: stripe-webhook-secret
    creationPolicy: Owner
  data:
    - secretKey: webhook-secret
      remoteRef:
        key: kv/bookstore-platform/stripe
        property: webhook_secret
