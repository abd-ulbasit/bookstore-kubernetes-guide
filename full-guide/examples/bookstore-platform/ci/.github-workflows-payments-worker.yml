################################################################################
# .github-workflows-payments-worker.yml — Bookstore Platform `payments-worker`
# service CI/CD.
#
# Parallel pattern to catalog/orders. payments-worker is a QUEUE CONSUMER —
# it subscribes to the orders.paid event, calls the payment provider, and
# updates the database. Test profile differs from the HTTP services:
#
#   - NO integration suite against Postgres alone — it always exercises both
#     Postgres AND the message broker, since the consumer's *entire reason
#     for existing* is the broker → DB flow.
#
#   - Coverage gate is the strictest of the three (80%). payments-worker
#     handles money; the unit-test suite includes a contract test against
#     a stubbed payment provider, idempotency assertions (the message MAY
#     be redelivered — the worker must be idempotent), and a poison-message
#     test (a malformed event must NOT crash the consumer; it goes to a
#     dead-letter queue).
#
#   - Race detector ON in BOTH unit and integration suites. The worker has
#     a goroutine pool consuming events concurrently; a data race here
#     could double-charge a customer.
#
#   - The image base is distroless `static:nonroot` (same as Part 09 ships)
#     and the Dockerfile is the existing one — multi-arch buildx works
#     without modification.
#
# Everything else (OIDC, ECR, cosign keyless, GitOps PR seam, branch-env
# rules) is identical to the catalog workflow. See ci/README.md.
################################################################################

name: payments-worker-ci

on:
  pull_request:
    paths:
      - 'app/payments-worker/**'
      - '.github/workflows/payments-worker.yml'
  push:
    branches:
      - main
    paths:
      - 'app/payments-worker/**'
      - '.github/workflows/payments-worker.yml'

permissions:
  id-token: write
  contents: read
  packages: read

concurrency:
  group: payments-worker-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.23'
  SERVICE: payments-worker
  WORKING_DIR: app/payments-worker
  # Strictest gate — money handler.
  COVERAGE_THRESHOLD: '80'

jobs:
  ############################################################################
  # 1. lint-test — strict coverage gate + race detector. Unit tests
  #    cover: idempotency (replay-safe consumer), poison-message handling
  #    (dead-letter queue), and a stubbed payment-provider contract.
  ############################################################################
  lint-test:
    name: lint + unit test (80% coverage gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ env.WORKING_DIR }}/go.sum

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: ${{ env.WORKING_DIR }}
          args: --timeout=5m

      - name: go test (unit, race + coverpkg=all)
        # -race REQUIRED on this service — the consumer runs N goroutines
        # in parallel; a race here is a double-charge waiting to happen.
        run: |
          go test -race -count=1 \
            -coverpkg=./... \
            -coverprofile=coverage.out \
            ./...

      - name: Enforce coverage gate (always, including PRs)
        # Unlike orders (PR-soft / main-strict), payments-worker gates on
        # ALL events. Money handlers don't get an "informational" coverage
        # number — the gate is the gate.
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%",""); print $3}')
          echo "Coverage: ${COVERAGE}% (threshold: ${COVERAGE_THRESHOLD}%)"
          awk -v c="$COVERAGE" -v t="$COVERAGE_THRESHOLD" \
            'BEGIN { if (c+0 < t+0) { exit 1 } }'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ env.SERVICE }}
          path: ${{ env.WORKING_DIR }}/coverage.out
          retention-days: 7

  ############################################################################
  # 2. integration-test — broker + DB, plus a stubbed payment provider.
  #    Tests verify: at-least-once delivery (a replayed event does not
  #    double-charge), poison-message DLQ, graceful shutdown (in-flight
  #    work finishes before SIGTERM).
  ############################################################################
  integration-test:
    name: integration test (broker + DB + provider stub)
    runs-on: ubuntu-latest
    needs: lint-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payments
          POSTGRES_PASSWORD: payments
          POSTGRES_DB: payments
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payments"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      DB_DSN: postgres://payments:payments@localhost:5432/payments?sslmode=disable
      AMQP_URL: amqp://guest:guest@localhost:5672/
      # The payment-provider stub binds 127.0.0.1:9000 in the integration
      # suite (a Go test helper in pkg/providertest). No real provider is
      # called from CI — testing against a real payment gateway is
      # out-of-scope (and would require credentials and a sandbox account).
      PROVIDER_URL: http://127.0.0.1:9000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ env.WORKING_DIR }}/go.sum

      - name: Run schema migration
        run: go run ./cmd/migrate

      - name: go test (integration, race)
        run: go test -tags=integration -race -count=1 -timeout=10m ./...

  ############################################################################
  # 3. scan — Trivy fs scan; same gate as catalog/orders.
  ############################################################################
  scan:
    name: trivy scan
    runs-on: ubuntu-latest
    needs: integration-test
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy fs
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ${{ env.WORKING_DIR }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

  ############################################################################
  # 4. build-sign-push — identical mechanism. Multi-arch buildx, push by
  #    digest, cosign keyless sign + SBOM + SLSA provenance.
  ############################################################################
  build-sign-push:
    name: build + sign + push
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_ECR }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}
          audience: sts.amazonaws.com

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.17.7

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          file: ${{ env.WORKING_DIR }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ vars.ECR_REGISTRY }}/bookstore/${{ env.SERVICE }}:sha-${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/bookstore/${{ env.SERVICE }}:latest-main
          provenance: true
          sbom: true
          cache-from: type=gha,scope=payments-worker
          cache-to: type=gha,mode=max,scope=payments-worker

      - name: Trivy — scan pushed image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ vars.ECR_REGISTRY }}/bookstore/${{ env.SERVICE }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Generate SBOM
        run: |
          syft "${{ vars.ECR_REGISTRY }}/bookstore/${{ env.SERVICE }}@${{ steps.build.outputs.digest }}" \
            -o spdx-json > "${{ env.SERVICE }}.spdx.json"

      - name: Cosign keyless sign
        env:
          COSIGN_YES: 'true'
        run: |
          cosign sign --yes \
            "${{ vars.ECR_REGISTRY }}/bookstore/${{ env.SERVICE }}@${{ steps.build.outputs.digest }}"

      - name: Cosign attest SBOM
        env:
          COSIGN_YES: 'true'
        run: |
          cosign attest --yes --type spdxjson \
            --predicate "${{ env.SERVICE }}.spdx.json" \
            "${{ vars.ECR_REGISTRY }}/bookstore/${{ env.SERVICE }}@${{ steps.build.outputs.digest }}"

      - name: Upload digest artifact
        run: echo "${{ steps.build.outputs.digest }}" > digest.txt
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ env.SERVICE }}
          path: digest.txt
          retention-days: 7
          if-no-files-found: error

  ############################################################################
  # 5. update-gitops-pr — one PR, atomic rollback per service.
  ############################################################################
  update-gitops-pr:
    name: open gitops PR
    runs-on: ubuntu-latest
    needs: build-sign-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PR_TOKEN }}
          path: gitops

      - name: Download digest artifact
        uses: actions/download-artifact@v4
        with:
          name: digest-${{ env.SERVICE }}
          path: .

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION=v5.5.0
          curl -fsSL -o /tmp/kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin
          kustomize version

      - name: Bump dev overlay digest
        run: |
          DIGEST="$(cat digest.txt)"
          if [ -z "$DIGEST" ] || ! echo "$DIGEST" | grep -q '^sha256:'; then
            echo "Refusing to write empty/invalid digest: '$DIGEST'"
            exit 1
          fi
          cd gitops/kustomize/overlays/dev
          kustomize edit set image \
            "bookstore/${{ env.SERVICE }}=${{ vars.ECR_REGISTRY }}/bookstore/${{ env.SERVICE }}@${DIGEST}"

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          path: gitops
          token: ${{ secrets.GITOPS_PR_TOKEN }}
          branch: bump/payments-worker-${{ github.sha }}
          base: main
          title: 'bump: payments-worker → ${{ github.sha }}'
          body: |
            Bump `bookstore/payments-worker` to the freshly built + signed image.

            - **commit**:  ${{ github.sha }}
            - **workflow**: ${{ github.workflow }} (run ${{ github.run_id }})
            - **coverage**: 80% threshold (strict — money handler)

            Argo CD (Part 07 ch.04) reconciles on merge.
            Kyverno `verifyImages` (Part 15 ch.03) verifies the keyless
            signature at admission against THIS workflow's OIDC identity.
          commit-message: 'bump(payments-worker): ${{ github.sha }}'
          delete-branch: true
