# Bookstore Platform v2 — Part 13 ch.08: Alibi-Detect drift detector.
# Consumes a sliding window of recommender predictions (predictions topic
# is `ml.predictions` — written by the recommender wrapper service), runs
# a Kolmogorov-Smirnov test against a reference window, publishes a
# `ml.drift` event when the KS statistic exceeds the threshold.
#
# v1 had no drift detection. v2 closes the MLOps loop with a drift detector
# + an Argo Events Sensor that triggers retraining on threshold breach.
#
# Alibi-Detect (https://github.com/SeldonIO/alibi-detect) is the Seldon-
# maintained Python library; the most-used drift detectors are:
#   - KSDrift          — Kolmogorov-Smirnov; univariate, fast, what we use.
#   - MMDDrift         — Maximum Mean Discrepancy; multivariate, more
#                        accurate, slower.
#   - ClassifierDrift  — train a classifier to distinguish reference vs
#                        production data; signal = its accuracy.
# The chapter walks all three; the manifest ships KSDrift for simplicity.
#
# Reference window: the chapter walks "the training data's feature
# distribution snapshot, stored alongside the MLflow run" — fetched at
# detector startup. Sliding window: the last 1000 predictions
# (configurable). p-value threshold: 0.05 (tunable).
#
# Apply:
#   kubectl apply -f examples/bookstore-platform/ml/alibi-detect-drift.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alibi-detect
  namespace: bookstore-platform-ml
  labels:
    app.kubernetes.io/part-of: bookstore-platform
    app.kubernetes.io/component: ml-drift
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alibi-detect
  namespace: bookstore-platform-ml
  labels:
    app: alibi-detect
    app.kubernetes.io/part-of: bookstore-platform
    app.kubernetes.io/component: ml-drift
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alibi-detect
  template:
    metadata:
      labels:
        app: alibi-detect
        app.kubernetes.io/part-of: bookstore-platform
    spec:
      serviceAccountName: alibi-detect
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alibi-detect
          image: bookstore-platform/alibi-detect:1.0.0
          imagePullPolicy: IfNotPresent
          # The image runs a small Python loop: KafkaConsumer on
          # `ml.predictions`; sliding window of 1000 records; KSDrift over
          # the feature columns; on detection, publish to `ml.drift`.
          env:
            - { name: KAFKA_BROKERS, value: "bookstore-platform-kafka-kafka-bootstrap.kafka-system.svc.cluster.local:9092" }
            - { name: KAFKA_TOPIC_PREDICTIONS, value: "ml.predictions" }
            - { name: KAFKA_TOPIC_DRIFT,       value: "ml.drift" }
            - { name: KAFKA_CONSUMER_GROUP,    value: "alibi-detect" }
            - { name: MLFLOW_TRACKING_URI,     value: "http://mlflow.mlflow.svc.cluster.local:5000" }
            - { name: MODEL_NAME,              value: "recommender" }
            - { name: DRIFT_DETECTOR,          value: "ks" }
            - { name: DRIFT_P_VALUE,           value: "0.05" }
            - { name: SLIDING_WINDOW_SIZE,     value: "1000" }
            - { name: LOG_LEVEL,               value: "info" }
            - { name: PORT,                    value: "8080" }
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alibi-detect
  namespace: bookstore-platform-ml
  labels:
    app.kubernetes.io/part-of: bookstore-platform
spec:
  selector:
    app: alibi-detect
  ports:
    - name: http
      port: 8080
      targetPort: 8080
