# Bookstore Platform v2 — Part 13 ch.11: the Backstage Scaffolder
# Template "New Bookstore microservice". A developer fills the form;
# the template creates a new GitHub repo + skeleton Go service +
# Helm chart + ArgoCD Application + BookstoreTenant claim (if a new
# tenant), all in one submission.
#
# v1 had no scaffolder; the v2 "5-minute new microservice" UX hangs
# on this template.
#
# The template is a Backstage CRD-like object — it lives in the
# Backstage catalog, NOT the Kubernetes API. Applied via the
# Backstage catalog API (Backstage reads it from a GitHub URL
# referenced in app-config.yaml's `catalog.locations`).
#
# This file is committed to the repo at
# /catalog/scaffolder-template-new-service.yaml; the app-config
# references it via `catalog.locations`.
#
# Apply: NEVER via kubectl. Backstage's catalog ingests it.
---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-bookstore-service
  title: "New Bookstore microservice"
  description: |
    Create a new microservice on the Bookstore Platform. Generates a
    skeleton Go service + Dockerfile + Helm chart + catalog-info.yaml
    + an Argo CD Application + (if new) a BookstoreTenant claim.
  tags:
    - bookstore-platform
    - golden-path
    - go
spec:
  owner: team-platform
  type: service

  parameters:
    - title: Service basics
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Service name
          type: string
          description: |
            kebab-case; becomes the repo name + the Kubernetes
            workload name. Letters, digits, dashes only.
          pattern: "^[a-z][a-z0-9-]{2,30}$"
          ui:autofocus: true
        description:
          title: One-line description
          type: string
          maxLength: 100
        owner:
          title: Owning team
          type: string
          description: Group entity ref (e.g. group:team-payments).
          ui:field: OwnerPicker
          ui:options:
            allowedKinds: [Group]
        system:
          title: System (logical grouping)
          type: string
          default: bookstore-platform
          ui:field: EntityPicker
          ui:options:
            allowedKinds: [System]

    - title: Service shape
      properties:
        port:
          title: HTTP port
          type: integer
          default: 8080
        language:
          title: Language
          type: string
          enum: ["go", "python", "node"]
          default: "go"

    - title: Tenant placement
      properties:
        tenant:
          title: Tenant slug
          type: string
          description: |
            Existing tenant slug (e.g. acme-books) — the service
            deploys into bookstore-platform-<TENANT>. Leave blank
            for the shared bookstore-platform namespace.
          pattern: "^([a-z][a-z0-9-]{2,30})?$"

  steps:
    # 1. Clone the skeleton repo + render placeholders.
    - id: fetch
      name: Fetch skeleton
      action: fetch:template
      input:
        url: https://github.com/your-org/bookstore-platform/tree/main/scaffolder-skeletons/${{ parameters.language }}-service
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          port: ${{ parameters.port }}
          tenant: ${{ parameters.tenant }}

    # 2. Create the GitHub repo + push the initial commit.
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: ${{ parameters.description }}
        repoUrl: github.com?owner=your-org&repo=bookstore-platform-${{ parameters.name }}
        defaultBranch: main
        protectDefaultBranch: true
        repoVisibility: private
        requireCodeOwnerReviews: true

    # 3. Create the BookstoreTenant claim (if a new tenant).
    - id: tenant-claim
      name: Apply BookstoreTenant claim
      if: ${{ parameters.tenant != "" }}
      action: kubernetes:apply
      input:
        clusterRef: bookstore-platform-us-east
        manifest: |
          apiVersion: platform.bookstore-platform.example.com/v1alpha1
          kind: BookstoreTenant
          metadata:
            name: ${{ parameters.tenant }}
          spec:
            parameters:
              tenant: ${{ parameters.tenant }}
              region: us-east

    # 4. Apply an Argo CD Application that points at the new repo.
    - id: argocd-app
      name: Register Argo CD Application
      action: kubernetes:apply
      input:
        clusterRef: bookstore-platform-us-east
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: bookstore-${{ parameters.name }}-us-east
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/your-org/bookstore-platform-${{ parameters.name }}
              path: helm
              targetRevision: HEAD
              helm:
                releaseName: ${{ parameters.name }}
            destination:
              server: https://kubernetes.default.svc
              namespace: bookstore-platform-${{ parameters.tenant or 'shared' }}
            syncPolicy:
              automated: { prune: true, selfHeal: true }
              syncOptions: [CreateNamespace=true, ServerSideApply=true]

    # 5. Register the new repo with Backstage's Catalog so it appears
    # in the UI immediately (does not wait for the 5-minute discovery).
    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Catalog entity
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: Argo CD Application
        url: https://argocd.bookstore-platform.example.com/applications/bookstore-${{ parameters.name }}-us-east
