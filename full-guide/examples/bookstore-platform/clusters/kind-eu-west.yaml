# Bookstore Platform v2 — Part 13 ch.03: kind cluster config for the eu-west
# region. A READER region: serves reads locally from a CNPG standby; writes
# proxy to us-east. On us-east outage, this region's standby is the candidate
# promotion target (the failover order is documented in 13.03 + the runbook
# stub in ../../runbooks/).
#
# Distinct apiServerPort (36444) so it coexists with us-east (36443) and
# ap-southeast (36445) on one machine.
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: bookstore-platform-eu-west
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 36444
  kubeProxyMode: "iptables"
  serviceSubnet: "10.97.0.0/16"
  podSubnet: "10.245.0.0/16"
nodes:
  - role: control-plane
    labels:
      topology.kubernetes.io/region: eu-west
      topology.kubernetes.io/zone: eu-west-a
      bookstore-platform.example.com/role: reader
  - role: worker
    labels:
      topology.kubernetes.io/region: eu-west
      topology.kubernetes.io/zone: eu-west-a
      bookstore-platform.example.com/role: reader
  - role: worker
    labels:
      topology.kubernetes.io/region: eu-west
      topology.kubernetes.io/zone: eu-west-b
      bookstore-platform.example.com/role: reader
