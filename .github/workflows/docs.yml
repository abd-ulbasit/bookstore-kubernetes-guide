name: docs

on:
  push:
    branches: [main]
    paths:
      - 'full-guide/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'full-guide/**'
      - 'mkdocs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Validate every ```mermaid block actually parses under the same parser
      # version production renders with (10.9.1). mkdocs build does NOT catch
      # mermaid syntax errors — they only show up in the reader's browser as
      # "Syntax error in text". Failing fast here keeps broken diagrams from
      # ever being deployed.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate mermaid diagrams
        # ESM bare-import resolution walks UP from the script file, so
        # node_modules must live somewhere above the script. Installing at
        # repo root is the simplest portable layout. node_modules/ is
        # gitignored so this never pollutes commits.
        run: |
          npm install --silent --no-save mermaid@10.9.1 jsdom
          node .github/scripts/validate-mermaid.mjs full-guide

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
